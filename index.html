<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>3D Solar System Exploration (Multiplayer)</title>
    <style>
      body {
        margin: 0;
        overflow: hidden;
        background-color: #000;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      }
      canvas {
        display: block;
      }
      #ui {
        position: absolute;
        bottom: 20px;
        left: 20px;
        color: rgba(255, 255, 255, 0.8);
        pointer-events: none;
        background: rgba(0, 0, 0, 0.5);
        padding: 15px;
        border-radius: 5px;
        border: 1px solid rgba(255, 255, 255, 0.2);
        z-index: 100;
      }
      .controls {
        font-size: 14px;
        margin-top: 10px;
      }
      .title {
        font-size: 18px;
        font-weight: bold;
        margin-bottom: 5px;
        color: #00ff00;
      }
    </style>
    <!-- Import map to resolve three.js and socket.io-client -->
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/",
          "socket.io-client": "https://cdn.socket.io/4.7.2/socket.io.esm.min.js"
        }
      }
    </script>
  </head>
  <body>
    <div id="ui">
      <div class="title">Solar System Explorer (v1.1)</div>
      <div class="controls">
        W/S: Forward/Backward Thrust<br/>
        A/D: Yaw Left/Right<br/>
        Q/E: Roll Left/Right<br/>
        Up/Down: Pitch Up/Down<br/>
        <b>Note: No auto-braking (Newtonian Physics)</b>
      </div>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
