<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>3D Milky Way Exploration</title>
    <style>
      body {
        margin: 0;
        overflow: hidden;
        background-color: #000;
        font-family: sans-serif;
      }
      canvas {
        display: block;
      }
      #ui {
        position: absolute;
        bottom: 20px;
        left: 20px;
        color: rgba(255, 255, 255, 0.7);
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <div id="ui">
      Controls:<br/>
      W/S - Forward/Backward Thrust<br/>
      A/D - Yaw Left/Right<br/>
      Q/E - Roll Left/Right<br/>
      Up/Down - Pitch Up/Down
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
